name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  maven:
    name: Maven Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build
        run: mvn -q clean package

      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: MobGift-plugin
          path: target/MobGift-*.jar
