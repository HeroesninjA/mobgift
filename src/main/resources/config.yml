drops:
  # false = keeps vanilla drops and adds the drops below as bonuses.
  # true = removes vanilla drops and only keeps the drops configured here.
  #
  # The default is false to avoid disrupting the server's vanilla economy.
  replace-default-drops: false

  # Custom drop list.
  #
  # Each key under "items" is an internal ID chosen by you.
  # You can add, remove, or rename drops without changing the code.
  #
  # Fields:
  # material: Bukkit/Paper item name, for example ROTTEN_FLESH, BONE, STRING.
  # amount: how many items are added when the drop succeeds.
  # chance: chance between 0.0 and 1.0.
  # mobs: list of mobs this drop applies to.
  #
  # Chance examples:
  # 0.05 = 5%
  # 0.10 = 10%
  # 0.25 = 25%
  # 0.50 = 50%
  # 1.00 = 100%
  #
  # For every mob:
  # mobs:
  #   - ALL
  #
  # For specific mobs:
  # mobs:
  #   - ZOMBIE
  #   - SKELETON
  #
  # Single-line format is also accepted:
  # mobs: ZOMBIE,SKELETON,CREEPER
  items:
    zombie_rotten_flesh:
      material: ROTTEN_FLESH
      amount: 1
      chance: 0.35
      mobs:
        - ZOMBIE
        - HUSK
        - DROWNED

    skeleton_bone:
      material: BONE
      amount: 1
      chance: 0.30
      mobs:
        - SKELETON
        - STRAY
        - WITHER_SKELETON

    skeleton_arrow:
      material: ARROW
      amount: 2
      chance: 0.20
      mobs:
        - SKELETON
        - STRAY
        - PILLAGER

    spider_string:
      material: STRING
      amount: 1
      chance: 0.30
      mobs:
        - SPIDER
        - CAVE_SPIDER

    creeper_gunpowder:
      material: GUNPOWDER
      amount: 1
      chance: 0.25
      mobs:
        - CREEPER

    slime_ball:
      material: SLIME_BALL
      amount: 1
      chance: 0.25
      mobs:
        - SLIME

    magma_cream:
      material: MAGMA_CREAM
      amount: 1
      chance: 0.15
      mobs:
        - MAGMA_CUBE

    enderman_pearl:
      material: ENDER_PEARL
      amount: 1
      chance: 0.06
      mobs:
        - ENDERMAN

    blaze_powder:
      material: BLAZE_POWDER
      amount: 1
      chance: 0.12
      mobs:
        - BLAZE

    witch_redstone:
      material: REDSTONE
      amount: 1
      chance: 0.14
      mobs:
        - WITCH

    witch_glowstone_dust:
      material: GLOWSTONE_DUST
      amount: 1
      chance: 0.10
      mobs:
        - WITCH

    drowned_copper:
      material: COPPER_INGOT
      amount: 1
      chance: 0.06
      mobs:
        - DROWNED

    guardian_prismarine:
      material: PRISMARINE_SHARD
      amount: 1
      chance: 0.18
      mobs:
        - GUARDIAN
        - ELDER_GUARDIAN

    phantom_membrane:
      material: PHANTOM_MEMBRANE
      amount: 1
      chance: 0.10
      mobs:
        - PHANTOM

    cow_leather:
      material: LEATHER
      amount: 1
      chance: 0.18
      mobs:
        - COW
        - MOOSHROOM

    chicken_feather:
      material: FEATHER
      amount: 1
      chance: 0.20
      mobs:
