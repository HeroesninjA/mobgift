config-version: 2

settings:
  # Enables detailed console logs for drop checks and chance rolls.
  # Keep this false on production servers unless you are troubleshooting.
  debug: false

drops:
  # false = keeps vanilla drops and adds the drops below as bonuses.
  # true = removes vanilla drops and only keeps the drops configured here.
  #
  # The default is false to avoid disrupting the server's vanilla economy.
  replace-default-drops: false

  # Custom drop list.
  #
  # Each key under "items" is an internal ID chosen by you.
  # You can add, remove, or rename drops without changing the code.
  #
  # Fields:
  # material: Bukkit/Paper item name, for example ROTTEN_FLESH, BONE, STRING.
  # amount: fixed number or min/max range.
  # chance: chance between 0.0 and 1.0.
  # mobs: list of mobs this drop applies to.
  # worlds: optional world filter. Defaults to ALL if missing.
  # biomes: optional biome filter. Defaults to ALL if missing.
  # permission: optional permission required for this drop.
  # required-tools: optional list of tools/weapons the killer must hold.
  # looting-bonus: optional bonus from the Looting enchantment.
  # message: optional player message when the drop is awarded.
  # display-name: optional custom item name.
  # lore: optional custom item lore.
  # custom-model-data: optional resource-pack model data value.
  #
  # Fixed amount:
  # amount: 1
  #
  # Random amount:
  # amount:
  #   min: 1
  #   max: 3
  #
  # Chance examples:
  # 0.05 = 5%
  # 0.10 = 10%
  # 0.25 = 25%
  # 0.50 = 50%
  # 1.00 = 100%
  #
  # For every mob:
  # mobs:
  #   - ALL
  #
  # For specific mobs:
  # mobs:
  #   - ZOMBIE
  #   - SKELETON
  #
  # Single-line format is also accepted:
  # mobs: ZOMBIE,SKELETON,CREEPER
  #
  # Optional permission filter:
  # permission: mobgift.vip
  #
  # Optional tool filter:
  # required-tools:
  #   - IRON_SWORD
  #   - DIAMOND_SWORD
  #
  # Optional biome filter:
  # biomes:
  #   - DESERT
  #   - BADLANDS
  #
  # Optional custom item metadata:
  # display-name: "&aMob Token"
  # lore:
  #   - "&7Dropped from {mob}"
  # custom-model-data: 1001
  items:
    zombie_rotten_flesh:
      material: ROTTEN_FLESH
      amount:
        min: 1
        max: 2
      chance: 0.35
      mobs:
        - ZOMBIE
        - HUSK
        - DROWNED
      worlds:
        - ALL
      looting-bonus:
        chance-per-level: 0.02
        amount-per-level: 0

    skeleton_bone:
      material: BONE
      amount: 1
      chance: 0.30
      mobs:
        - SKELETON
        - STRAY
        - WITHER_SKELETON

    skeleton_arrow:
      material: ARROW
      amount:
        min: 1
        max: 3
      chance: 0.20
      mobs:
        - SKELETON
        - STRAY
        - PILLAGER
      looting-bonus:
        chance-per-level: 0.02
        amount-per-level: 1

    spider_string:
      material: STRING
      amount: 1
      chance: 0.30
      mobs:
        - SPIDER
        - CAVE_SPIDER

    creeper_gunpowder:
      material: GUNPOWDER
      amount: 1
      chance: 0.25
      mobs:
        - CREEPER
      looting-bonus:
        chance-per-level: 0.03
        amount-per-level: 0

    slime_ball:
      material: SLIME_BALL
      amount: 1
      chance: 0.25
      mobs:
        - SLIME

    magma_cream:
      material: MAGMA_CREAM
      amount: 1
      chance: 0.15
      mobs:
        - MAGMA_CUBE

    enderman_pearl:
      material: ENDER_PEARL
      amount: 1
      chance: 0.06
      mobs:
        - ENDERMAN
      looting-bonus:
        chance-per-level: 0.01
        amount-per-level: 0

    blaze_powder:
      material: BLAZE_POWDER
      amount: 1
      chance: 0.12
      mobs:
        - BLAZE

    witch_redstone:
      material: REDSTONE
      amount:
        min: 1
        max: 2
      chance: 0.14
      mobs:
        - WITCH

    witch_glowstone_dust:
      material: GLOWSTONE_DUST
      amount: 1
      chance: 0.10
      mobs:
        - WITCH

    drowned_copper:
      material: COPPER_INGOT
      amount: 1
      chance: 0.06
      mobs:
        - DROWNED
      required-tools:
        - STONE_SWORD
        - IRON_SWORD
        - DIAMOND_SWORD
        - NETHERITE_SWORD

    guardian_prismarine:
      material: PRISMARINE_SHARD
      amount: 1
      chance: 0.18
      mobs:
        - GUARDIAN
        - ELDER_GUARDIAN

    phantom_membrane:
      material: PHANTOM_MEMBRANE
      amount: 1
      chance: 0.10
      mobs:
        - PHANTOM

    cow_leather:
      material: LEATHER
      amount: 1
      chance: 0.18
      mobs:
        - COW
        - MOOSHROOM

    chicken_feather:
      material: FEATHER
      amount: 1
      chance: 0.20
      mobs:
        - CHICKEN

    common_stick:
      material: STICK
      amount: 1
      chance: 0.03
      mobs:
        - ALL
      worlds:
        - ALL

    desert_husk_sand:
      material: SAND
      amount: 1
      chance: 0.08
      mobs:
        - HUSK
      biomes:
        - DESERT
